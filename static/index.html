<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestor de Gastos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

  <header>
    <span class="logo">💸 GastosApp</span>
    <span class="fecha" id="fechaHoy"></span>
  </header>

  <!-- ── RESUMEN ── -->
  <section class="resumen">
    <div class="card card--green">
      <span class="card-label">Ingresos</span>
      <span class="card-amount" id="totalIngresos">0,00 €</span>
    </div>
    <div class="card card--red">
      <span class="card-label">Gastos</span>
      <span class="card-amount" id="totalGastos">0,00 €</span>
    </div>
    <div class="card card--accent">
      <span class="card-label">Balance</span>
      <span class="card-amount" id="balance">0,00 €</span>
    </div>
  </section>

  <!-- ── FORMULARIO ── -->
  <section class="form-section">
    <h2>Nueva transacción</h2>
    <div class="form">

      <div class="tipo-toggle">
        <button class="toggle-btn active" id="btnIngreso" onclick="setTipo('ingreso')">Ingreso</button>
        <button class="toggle-btn" id="btnGasto" onclick="setTipo('gasto')">Gasto</button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Categoría</label>
          <select id="categoria">
            <option value="">Selecciona...</option>
            <!-- Se rellena dinámicamente según tipo -->
          </select>
        </div>
        <div class="form-group">
          <label>Cantidad (€)</label>
          <input type="number" id="cantidad" placeholder="0.00" min="0.01" step="0.01"/>
        </div>
      </div>

      <div class="form-group">
        <label>Descripción (opcional)</label>
        <input type="text" id="descripcion" placeholder="Ej: Supermercado Mercadona"/>
      </div>

      <button class="btn-add" onclick="agregarTransaccion()">+ Añadir</button>
    </div>
  </section>

  <!-- ── LISTA ── -->
  <section class="lista-section">
    <div class="lista-header">
      <h2>Transacciones</h2>
      <div class="filtros">
        <button class="filtro active" onclick="filtrar('todas', this)">Todas</button>
        <button class="filtro" onclick="filtrar('ingreso', this)">Ingresos</button>
        <button class="filtro" onclick="filtrar('gasto', this)">Gastos</button>
      </div>
    </div>
    <ul class="lista" id="lista"></ul>
    <p class="empty" id="empty">No hay transacciones aún.</p>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
